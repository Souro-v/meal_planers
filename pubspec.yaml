name: meal_planers
description: Mealtime - Meal Planning App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  get: ^4.6.6

  # UI
  google_fonts: ^6.1.0
  font_awesome_flutter: ^10.7.0

  # Networking
  dio: ^5.4.0

  # Storage
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Media
  cached_network_image: ^3.3.0
  share_plus: ^10.0.0
  pdf: ^3.10.8
  printing: ^5.13.0

  # Notifications
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.2

  # Auth
  google_sign_in: ^6.2.0
  flutter_facebook_auth: ^7.0.0

  # Utilities
  wakelock_plus: ^1.2.8
  connectivity_plus: ^6.0.3
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.3.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icons/app_logo.png"

flutter_native_splash:
  color: "#FFFFFF"
  image: assets/icons/app_logo.png
  android: true
  ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/
   # - assets/images/meals/